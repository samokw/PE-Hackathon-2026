# Scrape the API /metrics endpoint. Default: API on the same host as Docker (Flask on :5000).
# Compose sets extra_hosts so host.docker.internal resolves to the host gateway (Linux/macOS).
#
# To scrape a public HTTPS URL instead (e.g. production behind TLS), replace this job with:
#   - job_name: hackathon-api
#     scheme: https
#     metrics_path: /metrics
#     static_configs:
#       - targets: ['your.domain.example']

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: hackathon-api
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:5000']
